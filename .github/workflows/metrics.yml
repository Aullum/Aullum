name: Metrics

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg

          # Основные секции профиля
          base: header, repositories, activity
          config_timezone: Europe/Kyiv

          # Учитывать приватные репозитории и все твои коммиты
          repositories_affiliations: owner, collaborator
          commits_authoring: >
            Aullum
            Aullum <roman.zidinov@gmail.com>
            Roman <roman.zidinov@gmail.com>
            Roman Zidinov <roman.zidinov@gmail.com>

          # Календарь активности (ключевая метрика)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Языковой профиль (включая приватные репо)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage

          # Для чистоты
          plugin_traffic: no
          plugin_lines: no
